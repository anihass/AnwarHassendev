<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Project</title>
    <link rel="stylesheet" href="stylesheet/upload-night.css" id="theme-style">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="dark">
    <nav class="navbar">        
    </nav>
    <div class="container">
        <h1>Add New Project</h1>

        <form id="projectForm">

            <div class="form-group">
                <label>Project Title</label>
                <input
                    type="text"
                    id="title"
                    placeholder="Enter project title"
                    required
                >
            </div>

            <div class="form-group">
                <label>Project Description</label>
                <textarea
                    id="description"
                    rows="6"
                    placeholder="Enter project description"
                    required
                ></textarea>
            </div>

            <div class="form-group">
                <label>Project Image</label>
                <input
                    type="file"
                    id="image"
                    accept="image/*"
                    required
                >
            </div>

            <div class="preview-container">
                <img id="preview" alt="Preview">
            </div>
            <div id="message"></div>

            <button type="submit">
                Upload Project
            </button>

        </form>
    </div>

    <script src="script/upload.js" type="module"></script>
</body>
</html>
